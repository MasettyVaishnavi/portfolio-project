<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vaishnavi | Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <nav>
        <h2 class="logo">Vaishnavi</h2>
        <ul>
            <li><a href="#about">About</a></li>
            <li><a href="#skills">Skills</a></li>
            <li><a href="#projects">Projects</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <h1>Hi, I'm Vaishnavi 👋</h1>
        <p>Aspiring Full Stack Developer</p>
        <button onclick="scrollToProjects()">View My Work</button>
    </section>

    <!-- About -->
    <section id="about">
        <h2>About Me</h2>
        <p>I am a passionate developer learning full-stack development and building real-world projects.</p>
    </section>

    <!-- Skills -->
    <section id="skills">
        <h2>Skills</h2>
        <div class="skills-container">
            <div class="skill">HTML</div>
            <div class="skill">CSS</div>
            <div class="skill">JavaScript</div>
            <div class="skill">Node.js</div>
            <div class="skill">MySQL</div>
        </div>
    </section>

    <!-- Projects -->
    <section id="projects">
        <h2>Projects</h2>
        <div id="projects-container"></div>
    </section>

    <!-- Contact -->
    <section id="contact">
        <h2>Contact Me</h2>
        <form id="contactForm">
            <input type="text" id="name" placeholder="Your Name" required>
            <input type="email" id="email" placeholder="Your Email" required>
            <textarea id="message" placeholder="Your Message" required></textarea>
            <button type="submit">Send Message</button>
        </form>
    </section>

    <script src="script.js"></script>
</body>
</html>
